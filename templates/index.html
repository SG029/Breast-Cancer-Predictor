<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  </head>
  <body>

    <div class="container">
        <h1 style="text-align: center;">Breast Cancer Prediction</h1>
        <img style="align-items: center; justify-content: center; width: 30%; height: auto;" src="{{ url_for('static', filename='img.jpg') }}" alt="Breast Cancer">

        <form action="/predict" method="post">
            <div class="form-group">
                <label for="exampleInputEmail1">Input all medical breast cancer features</label>
                <input type="text" name="features" class="form-control" id="exampleInputEmail1" aria-describedby="emailHelp">
                <small id="emailHelp" class="form-text text-muted">We'll never share your email with anyone else.</small>
            </div>
            <button type="submit" class="btn btn-primary">Submit</button>
        </form>
        {% for i in message %}
            {% if i=="cancerous" %}
            <div class="card" style="width: 18rem;">
  <img src="{{ url_for('static', filename='alert_imge.png') }}" class="card-img-top" alt="...">
  <div class="card-body">
    <h5 class="card-title">Cancerous</h5>
    <p class="card-text">Consult a doctor immediately.</p>
  </div>
</div>


            {% else %}

            <div class="card" style="width: 18rem;">
  <img src="{{ url_for('static', filename='okay_img.jpg') }}" class="card-img-top" alt="...">
  <div class="card-body">
    <h5 class="card-title">Non-Cancerous</h5>
    <p class="card-text">You are okay.</p>
  </div>
</div>

            {% endif %}
        {% endfor %}

    </div>

    <script src="https://cdn.jsdelivr.net" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  </body>
</html>
